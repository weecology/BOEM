[project]
name = "boem"
description = "BOEM bird detection and classification pipeline"
readme = "README.md"
requires-python = ">=3.10"
version = "0.0.0"
dependencies = [
  "numpy==1.26.4",
  "pandas",
  "scikit-learn",
  "hydra-core",
  "omegaconf",
  "geopandas",
  "rasterio",
  "dask",
  "bokeh",
  "matplotlib",
  "paramiko",
  "torch",
  "torchmetrics",
  "pytorch-lightning",
  "label-studio-sdk",
  "label-studio-converter",
  "comet-ml",
  "deepforest @ /home/b.weinstein/DeepForest",
  "globus-sdk",
  # H-CAST requirements
  "timm==0.4.12",
  "opencv-contrib-python==4.9.0.80",
  # DGL wheels may require a custom index (see https://data.dgl.ai/wheels/repo.html)
  "dgl",
  "packaging",
  # DeepForest-based detection/classification (local source)
  "deepforest"
]

[tool.uv]
find-links = ["https://data.dgl.ai/wheels/repo.html"]
